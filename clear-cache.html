<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャッシュクリア - 高校サッカーリーグ順位表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔄</div>
        <h1>キャッシュクリア</h1>
        <p>
            ローカルストレージに保存された古いデータをクリアして、<br>
            最新のデータを再読み込みします。
        </p>
        
        <button class="btn" onclick="clearCache()">
            <i class="fas fa-trash-alt"></i> キャッシュをクリア
        </button>
        
        <button class="btn btn-secondary" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> 戻る
        </button>

        <div id="status" class="status"></div>
    </div>

    <script>
        function clearCache() {
            const statusDiv = document.getElementById('status');
            
            try {
                // ローカルストレージをクリア
                localStorage.removeItem('soccerTeamsCustomData');
                
                statusDiv.className = 'status success';
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = '✅ キャッシュをクリアしました！<br>3秒後にトップページに戻ります...';
                
                // 3秒後にトップページへリダイレクト
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);
                
            } catch (error) {
                statusDiv.className = 'status info';
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = '⚠️ エラーが発生しました: ' + error.message;
            }
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        // ページ読み込み時にローカルストレージの状態を確認
        window.onload = () => {
            const hasCache = localStorage.getItem('soccerTeamsCustomData');
            const statusDiv = document.getElementById('status');
            
            if (hasCache) {
                statusDiv.className = 'status info';
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = 'ℹ️ ローカルストレージにキャッシュデータがあります';
            } else {
                statusDiv.className = 'status success';
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = '✅ ローカルストレージは空です（キャッシュなし）';
            }
        };
    </script>
</body>
</html>
