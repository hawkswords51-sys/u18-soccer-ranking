#          （各内定は原則クラブ公式発表を一次情報として照合。手順書3-1準拠）
# 更新方法: 新しい内定/2種登録が発表されるたびに、該当リストに1行足す（手順書4-13参照）。
# 注意:
#   - team は「現所属チーム（＝当サイトの表記）」。ここがチーム詳細ページへのリンク元になる。
#     サイトのチーム名に寄せて書く（例: 東海大学付属静岡翔洋高／鹿島アントラーズユース）。
#     表記ゆれの名寄せは scraper/national_team.py の CLUB_ALIASES を共用（トップ名→U-18表記）。
#   - name は姓と名の間に半角スペース1つ（JFA/クラブ公式表記に準拠）。
#   - dest は内定先（加入先）のトップクラブ名。テキスト表示のみ（リンクなし）。
#   - cat は "高体連"（高校）か "Jユース"（Jクラブ育成組織）。
#   - note（任意）は補足（加入時期・完全移籍・年齢など）。
# =====================================================================
