# ============================================================
# 高円宮杯 U-18 プレミアリーグ参入戦・昇降格データ (手動入力)
# ============================================================
# このファイルに毎年12月の参入戦結果を記入し、
#   python scraper/apply_promotion.py --season 2025-2026
# を実行すると、teams.json のリーグ所属が自動更新されます。
#
# ■ 記入のコツ
#   - チーム名は teams.json と同じ書き方（aliases も使える）
#   - from / to はリーグ名を完全一致で書く
#     例: "プレミアEAST" → "プリンスリーグ関東1部"
#         "プリンスリーグ中国" → "プレミアWEST"
#   - 1年分まとめて記入してOK（順序は任意）
#
# ■ よく使うリーグ名一覧
#   プレミアリーグ:  "プレミアEAST", "プレミアWEST"
#   プリンスリーグ:  "プリンスリーグ関東1部", "プリンスリーグ関東2部"
#                   "プリンスリーグ東北1部", "プリンスリーグ東北2部"
#                   "プリンスリーグ北海道", "プリンスリーグ北信越1部", "プリンスリーグ北信越2部"
#                   "プリンスリーグ東海"
#                   "プリンスリーグ関西1部", "プリンスリーグ関西2部"
#                   "プリンスリーグ中国"
#                   "プリンスリーグ四国"
#                   "プリンスリーグ九州1部", "プリンスリーグ九州2部"
# ============================================================

