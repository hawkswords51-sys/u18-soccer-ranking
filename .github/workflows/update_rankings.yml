name: 高円宮杯 順位自動更新
on:
  # 毎週月曜日 9:00 JST (= UTC 00:00) に自動実行
  schedule:
    - cron: '0 0 * * 1'
  # 手動実行ボタンもGitHub画面から使えるようにする
  workflow_dispatch:
    inputs:
      year:
        description: '対象年度 (例: 2026)'
        required: false
        default: ''
      dry_run:
        description: 'テスト実行 (保存しない)'
        type: boolean
        required: false
        default: false
  # tournaments_data.yml を編集して push したら即時反映
  push:
    branches: [main]
    paths:
      - 'data/tournaments_data.yml'
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # data/teams.json をコミット・プッシュするため
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt
      - name: 依存ライブラリをインストール
        run: |
          pip install -r scraper/requirements.txt
          pip install selenium webdriver-manager pyyaml markdown
      - name: 順位データを更新
        if: ${{ github.event_name != 'push' }}
        run: |
          YEAR="${{ github.event.inputs.year }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          ARGS=""
          if [ -n "$YEAR" ]; then ARGS="$ARGS --year $YEAR"; fi
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scraper/update.py $ARGS
      - name: 近似重複チームを自動検出・削除
        if: ${{ github.event.inputs.dry_run != 'true' && github.event_name != 'push' }}
        run: |
          if [ -f scraper/dedup_near_duplicates.py ]; then
            python scraper/dedup_near_duplicates.py
          else
            echo "scraper/dedup_near_duplicates.py がまだありません。スキップ。"
          fi
      - name: リーグ順位を勝点ベースで再計算 (都道府県内のみ)
        if: ${{ github.event.inputs.dry_run != 'true' && github.event_name != 'push' }}
        run: |
          if [ -f scraper/normalize_league_ranks.py ]; then
            python scraper/normalize_league_ranks.py
          else
            echo "scraper/normalize_league_ranks.py がまだありません。スキップ。"
          fi
      - name: 大会成績 YAML から JSON を生成
        continue-on-error: true
        run: |
          if [ -f data/tournaments_data.yml ]; then
            python scraper/build_tournaments.py
          else
            echo "data/tournaments_data.yml がまだありません。スキップ。"
          fi
      # ★ エイリアス重複・空チームの自動クリーンアップ
      - name: エイリアス重複・空チームを自動クリーンアップ
        if: ${{ github.event.inputs.dry_run != 'true' && github.event_name != 'push' }}
        run: |
          if [ -f scraper/cleanup_aliases.py ]; then
            python scraper/cleanup_aliases.py --apply --remove-empty
          else
            echo "scraper/cleanup_aliases.py がまだありません。スキップ。"
          fi
      # ★ Phase 9-A: 都道府県別 SEO ランディングページ自動生成
      - name: 都道府県別 SEO ページを再生成
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -f scraper/generate_prefecture_pages.py ]; then
            python scraper/generate_prefecture_pages.py
          else
            echo "scraper/generate_prefecture_pages.py がまだありません。スキップ。"
          fi
      # ★ Phase 9-B: リーグ専用ページと sitemap 完全版を再生成
      - name: リーグ専用ページと sitemap を再生成
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -f scraper/generate_league_pages.py ]; then
            python scraper/generate_league_pages.py
          else
            echo "scraper/generate_league_pages.py がまだありません。スキップ。"
          fi
      # ★ Phase 9-D: ブログ記事ページを生成 (Markdown -> HTML)
      - name: ブログ記事ページを再生成
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -f scraper/generate_blog_pages.py ]; then
            python scraper/generate_blog_pages.py
          else
            echo "scraper/generate_blog_pages.py がまだありません。スキップ。"
          fi
      - name: 変更があればコミット＆プッシュ
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # データファイル
          if [ -f data/teams.json ]; then git add data/teams.json; fi
          if [ -f data/tournaments.json ]; then git add data/tournaments.json; fi
          # SEO ランディングページと sitemap
          if [ -d prefectures ]; then git add prefectures; fi
          if [ -d leagues ]; then git add leagues; fi
          if [ -d blog ]; then git add blog; fi
          if [ -d blog-source ]; then git add blog-source; fi
          if [ -f sitemap.xml ]; then git add sitemap.xml; fi
          # 変更がある場合のみコミット & push
          if git diff --staged --quiet; then
            echo "変更なし – push スキップ"
          else
            git commit -m "chore: 順位/大会データ・SEO/リーグページ自動更新 $(date '+%Y-%m-%d')"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push 失敗、リトライ $i/3 ..."
              sleep 5
            done
          fi
