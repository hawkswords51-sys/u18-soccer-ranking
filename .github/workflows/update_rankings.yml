name: 高円宮杯 順位自動更新

on:
  # 毎日 7:00 JST (= UTC 22:00) に自動実行
  schedule:
    - cron: '0 22 * * *'

  # 手動実行ボタンもGitHub画面から使えるようにする
  workflow_dispatch:
    inputs:
      year:
        description: '対象年度 (例: 2026)'
        required: false
        default: ''
      dry_run:
        description: 'テスト実行 (保存しない)'
        type: boolean
        required: false
        default: false

  # データ・記事ファイルを編集して push したら即時反映（手動 Run workflow 不要）
  # ※push起動時はスクレイピング(順位取得等)をスキップし、ページ再生成＋コミットだけ走る
  # ※botの自動コミット(GITHUB_TOKEN)はワークフローを再起動しないGitHub仕様のため無限ループしない
  push:
    branches: [main]
    paths:
      - 'data/tournaments_data.yml'
      - 'data/team-profiles/**'
      - 'data/tournaments/**'
      - 'data/scorers/**'
      - 'data/league_matches/**'
      - 'data/national-team-players.yml'
      - 'data/pro-signings.yml'
      - 'data/premier_final_history.yml'
      - 'blog-source/**'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # data/teams.json をコミット・プッシュするため

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: 依存ライブラリをインストール
        run: |
          pip install -r scraper/requirements.txt
          pip install selenium webdriver-manager pyyaml markdown
          pip install pandas lxml

      - name: 順位データを更新
        if: ${{ github.event_name != 'push' }}
        run: |
          YEAR="${{ github.event.inputs.year }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          ARGS=""
          if [ -n "$YEAR" ]; then ARGS="$ARGS --year $YEAR"; fi
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scraper/update.py $ARGS

      - name: 近似重複チームを自動検出・削除
        if: ${{ github.event.inputs.dry_run != 'true' && github.event_name != 'push' }}
        run: |
          if [ -f scraper/dedup_near_duplicates.py ]; then
            python scraper/dedup_near_duplicates.py
          else
            echo "scraper/dedup_near_duplicates.py がまだありません。スキップ。"
          fi

      - name: リーグ順位を勝点ベースで再計算 (都道府県内のみ)
        if: ${{ github.event.inputs.dry_run != 'true' && github.event_name != 'push' }}
        run: |
          if [ -f scraper/normalize_league_ranks.py ]; then
            python scraper/normalize_league_ranks.py
          else
            echo "scraper/normalize_league_ranks.py がまだありません。スキップ。"
          fi

      - name: 大会成績 YAML から JSON を生成
        continue-on-error: true
        run: |
          if [ -f data/tournaments_data.yml ]; then
            python scraper/build_tournaments.py
          else
            echo "data/tournaments_data.yml がまだありません。スキップ。"
          fi

      # ★ エイリアス重複・空チームの自動クリーンアップ
      - name: エイリアス重複・空チームを自動クリーンアップ
        if: ${{ github.event.inputs.dry_run != 'true' && github.event_name != 'push' }}
        run: |
          if [ -f scraper/cleanup_aliases.py ]; then
            python scraper/cleanup_aliases.py --apply --remove-empty
          else
            echo "scraper/cleanup_aliases.py がまだありません。スキップ。"
          fi

      # ★ 戦績表データ(data/league_matches)を更新（順位表と同じ実行で一緒に更新）
      #   ページ生成より前に実行し、最新の戦績表がリーグ／県ページに反映されるようにする
      - name: 戦績表データを更新（プレミア・プリンス）
        if: ${{ github.event.inputs.dry_run != 'true' && github.event_name != 'push' }}
        continue-on-error: true
        run: |
          if [ -f scraper/update_cross_tables.py ]; then
            python scraper/update_cross_tables.py
          else
            echo "scraper/update_cross_tables.py がまだありません。スキップ。"
          fi

      - name: 戦績表データを更新（県1部・junior-soccer出典）
        if: ${{ github.event.inputs.dry_run != 'true' && github.event_name != 'push' }}
        continue-on-error: true
        run: |
          if [ -f scraper/update_pref_cross_tables.py ]; then
            python scraper/update_pref_cross_tables.py
          else
            echo "scraper/update_pref_cross_tables.py がまだありません。スキップ。"
          fi

      - name: 県別得点ランキングを更新（県協会公式 / GoalNote）
        if: ${{ github.event.inputs.dry_run != 'true' && github.event_name != 'push' }}
        continue-on-error: true
        run: |
          if [ -f scraper/fetch_pref_scorers.py ]; then
            python scraper/fetch_pref_scorers.py
          else
            echo "scraper/fetch_pref_scorers.py がまだありません。スキップ。"
          fi

      # ★ 県予選トーナメント（選手権・インターハイ等）の組み合わせ・結果を自動更新
      #   対象: data/tournaments/*.md のうち frontmatter に source:(kokoのURL) があり status が「終了」でないもの
      #   ログに「⚠ 要確認」が出た試合は週末に手動確認する（誤記検出・出典異常など）
      - name: 県予選トーナメント結果を更新（koko-soccer出典）
        if: ${{ github.event.inputs.dry_run != 'true' && github.event_name != 'push' }}
        continue-on-error: true
        run: |
          if [ -f scraper/update_tournament_results.py ]; then
            python scraper/update_tournament_results.py
          else
            echo "scraper/update_tournament_results.py がまだありません。スキップ。"
          fi

      # ★ Phase 9-A: 都道府県別 SEO ランディングページ自動生成
      - name: 都道府県別 SEO ページを再生成
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -f scraper/generate_prefecture_pages.py ]; then
            python scraper/generate_prefecture_pages.py
          else
            echo "scraper/generate_prefecture_pages.py がまだありません。スキップ。"
          fi

      # ★ Phase 9-B: リーグ専用ページと sitemap 完全版を再生成
      - name: リーグ専用ページと sitemap を再生成
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -f scraper/generate_league_pages.py ]; then
            python scraper/generate_league_pages.py
          else
            echo "scraper/generate_league_pages.py がまだありません。スキップ。"
          fi
          
      # ★ Phase C: チーム個別ページを再生成
      - name: チーム個別ページを再生成
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -f scraper/generate_team_pages.py ]; then
            python scraper/generate_team_pages.py
          else
            echo "scraper/generate_team_pages.py がまだありません。スキップ。"
          fi

      # ★ Phase C-2: 日本代表（U-16/17/18）選出選手ページを再生成
      - name: 日本代表選出選手ページを再生成
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -f scraper/generate_national_team_page.py ]; then
            python scraper/generate_national_team_page.py
          else
            echo "scraper/generate_national_team_page.py がまだありません。スキップ。"
          fi

      # ★ Phase C-3: プロ内定・2種登録選手ページを再生成
      - name: プロ内定・2種登録選手ページを再生成
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -f scraper/generate_pro_signings_page.py ]; then
            python scraper/generate_pro_signings_page.py
          else
            echo "scraper/generate_pro_signings_page.py がまだありません。スキップ。"
          fi

      # ★ Phase 9-D: ブログ記事ページを生成 (Markdown -> HTML)
      - name: ブログ記事ページを再生成
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -f scraper/generate_blog_pages.py ]; then
            python scraper/generate_blog_pages.py
          else
            echo "scraper/generate_blog_pages.py がまだありません。スキップ。"
          fi

      # ★ インターハイ本選（全国大会）ページを生成
      - name: インターハイ本選ページを再生成
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -f scraper/generate_interhigh_page.py ]; then
            python scraper/generate_interhigh_page.py
          else
            echo "scraper/generate_interhigh_page.py がまだありません。スキップ。"
          fi
          
      # ★ Jユースカップ ページを生成
      - name: Jユースカップページを再生成
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -f scraper/generate_jyouth_page.py ]; then
            python scraper/generate_jyouth_page.py
          else
            echo "scraper/generate_jyouth_page.py がまだありません。スキップ。"
          fi

      - name: 地域大会まとめページを再生成
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -f scraper/generate_regional_page.py ]; then
            python scraper/generate_regional_page.py
          else
            echo "scraper/generate_regional_page.py がまだありません。スキップ。"
          fi

      - name: U-18年間スケジュールページを再生成
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -f scraper/generate_u18_calendar.py ]; then
            python scraper/generate_u18_calendar.py
          else
            echo "scraper/generate_u18_calendar.py がまだありません。スキップ。"
          fi

      - name: 変更があればコミット＆プッシュ
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # ★修正: 生成物の取り残し（未ステージ）でpushが失敗するのを防ぐため全変更をステージ
          git add -A

          # データファイル
          if [ -f data/teams.json ]; then git add data/teams.json; fi
          if [ -f data/tournaments.json ]; then git add data/tournaments.json; fi

          # SEO ランディングページと sitemap
          if [ -d prefectures ]; then git add prefectures; fi
          if [ -d leagues ]; then git add leagues; fi
          if [ -d teams ]; then git add teams; fi
          if [ -d blog ]; then git add blog; fi
          if [ -d blog-source ]; then git add blog-source; fi
          if [ -d tournaments ]; then git add tournaments; fi
          if [ -d data/tournaments ]; then git add data/tournaments; fi
          if [ -f sitemap.xml ]; then git add sitemap.xml; fi
          if [ -f index.html ]; then git add index.html; fi

          # 変更がある場合のみコミット & push
          if git diff --staged --quiet; then
            echo "変更なし – push スキップ"
          else
            git commit -m "chore: 順位/大会データ・SEO/リーグページ自動更新 $(date '+%Y-%m-%d')"
            # ★修正(2026-07-11): push が3回とも失敗したらジョブを赤(失敗)にする
            #   以前は失敗しても緑のまま終わり「Actionsは緑なのにサイトが変わらない」罠の原因だった
            PUSHED=0
            for i in 1 2 3; do
              if git pull --rebase --autostash origin main && git push; then
                PUSHED=1
                break
              fi
              echo "push 失敗、リトライ $i/3 ..."
              sleep 5
            done
            if [ "$PUSHED" != "1" ]; then
              echo "::error::push が3回失敗しました。サイトに反映されていません。このステップのログを確認してください。"
              exit 1
            fi
          fi

      # ★ Phase 9-E: IndexNow に更新を通知（Bing 等への即時インデックス通知）
      - name: IndexNow に更新を通知
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        run: |
          if [ -f scraper/notify_indexnow.py ] && [ -f sitemap.xml ]; then
            python scraper/notify_indexnow.py
          else
            echo "scraper/notify_indexnow.py または sitemap.xml がありません。スキップ。"
          fi
