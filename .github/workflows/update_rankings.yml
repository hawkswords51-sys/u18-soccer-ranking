name: 高円宮杯 順位自動更新
on:
  # 毎週月曜日 9:00 JST (= UTC 00:00) に自動実行
  schedule:
    - cron: '0 0 * * 1'
  # 手動実行ボタンもGitHub画面から使えるようにする
  workflow_dispatch:
    inputs:
      year:
        description: '対象年度 (例: 2026)'
        required: false
        default: ''
      dry_run:
        description: 'テスト実行 (保存しない)'
        type: boolean
        required: false
        default: false
  # tournaments_data.yml を編集して push したら即時反映
  push:
    branches: [main]
    paths:
      - 'data/tournaments_data.yml'
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # data/teams.json をコミット・プッシュするため
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt
      - name: 依存ライブラリをインストール
        run: |
          pip install -r scraper/requirements.txt
          # Selenium + Chrome もインストール（JS描画対応）
          pip install selenium webdriver-manager
          # YAML 読み込み用
          pip install pyyaml
          # GitHub Actions の Ubuntu には Chrome が入っている
          # chrome-driver は selenium が自動管理
      - name: 順位データを更新
        # push トリガー (YAML編集時) では順位スクレイプは省略
        if: ${{ github.event_name != 'push' }}
        run: |
          YEAR="${{ github.event.inputs.year }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          ARGS=""
          if [ -n "$YEAR" ]; then
            ARGS="$ARGS --year $YEAR"
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scraper/update.py $ARGS
      - name: 大会成績 YAML から JSON を生成
        # 常に実行 (1秒で終わる軽い処理)
        continue-on-error: true
        run: |
          if [ -f data/tournaments_data.yml ]; then
            python scraper/build_tournaments.py
          else
            echo "data/tournaments_data.yml がまだありません。スキップ。"
          fi
      - name: 変更があればコミット＆プッシュ
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # teams.json (順位) と tournaments.json (大会) 両方を対象に
          if [ -f data/teams.json ]; then
            git add data/teams.json
          fi
          if [ -f data/tournaments.json ]; then
            git add data/tournaments.json
          fi
          # 変更がある場合のみコミット & push
          if git diff --staged --quiet; then
            echo "変更なし – push スキップ"
          else
            git commit -m "chore: 順位/大会データを自動更新 $(date '+%Y-%m-%d')"
            # リモートの最新を取り込んでから push (race condition 対策)
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push 失敗、リトライ $i/3 ..."
              sleep 5
            done
          fi
